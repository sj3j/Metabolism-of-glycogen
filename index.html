<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glycogen Metabolism — Hogwarts Biochemistry</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=IM+Fell+English:ital@0;1&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold-light: #f0cc6a; --gold-dim: #8b6a28;
      --parchment: #f2deb0; --ink: #1e110a; --ink-mid: #3d2010;
      --bg: #060300; --red-acc: #8b1010; --green-acc: #1a5c2a;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      font-family: 'Crimson Text', Georgia, serif;
      color: var(--ink); min-height: 100vh; overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0500; }
    ::-webkit-scrollbar-thumb { background: #c9a84c44; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
    #star-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    #root { position: relative; z-index: 1; }

    /* ══════════════════════════════════════
       3D ORB — THE FLOATING MAGIC BUBBLE
    ══════════════════════════════════════ */
    .orb-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      cursor: pointer;
      user-select: none;
    }
    .orb-body {
      position: relative;
      width: 118px; height: 118px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 30%,
          rgba(255,235,155,0.38) 0%,
          rgba(155,98,18,0.52) 18%,
          rgba(38,18,2,0.88) 52%,
          rgba(6,3,0,0.97) 82%
        );
      box-shadow:
        0 0 0 1.5px rgba(201,168,76,0.28),
        0 0 22px rgba(201,168,76,0.22),
        0 0 55px rgba(201,168,76,0.08),
        7px 12px 26px rgba(0,0,0,0.80),
        inset 2px 3px 14px rgba(255,220,110,0.18),
        inset -5px -7px 18px rgba(0,0,0,0.65);
      transition: box-shadow 0.35s ease, transform 0.35s ease;
      overflow: hidden;
    }
    /* Top-left primary shine */
    .orb-body::before {
      content: '';
      position: absolute;
      top: 11%; left: 17%;
      width: 30%; height: 22%;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(255,255,255,0.52) 0%,
        rgba(255,255,255,0.18) 45%,
        transparent 72%
      );
      filter: blur(1.5px);
      pointer-events: none;
      z-index: 5;
    }
    /* Bottom-right secondary glint */
    .orb-body::after {
      content: '';
      position: absolute;
      bottom: 18%; right: 16%;
      width: 13%; height: 9%;
      border-radius: 50%;
      background: radial-gradient(ellipse,
        rgba(255,255,255,0.22) 0%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 5;
    }
    .orb-diagram {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 2;
    }
    .orb-label {
      font-family: 'Cinzel', serif;
      font-size: 0.60rem; font-weight: 600;
      letter-spacing: 0.10em;
      color: rgba(201,168,76,0.75);
      text-align: center; max-width: 100px;
      transition: color 0.3s ease;
      text-transform: uppercase;
    }

    /* Active & Hover states */
    .orb-wrapper:hover .orb-body {
      box-shadow:
        0 0 0 2px rgba(201,168,76,0.55),
        0 0 30px rgba(201,168,76,0.45),
        0 0 70px rgba(201,168,76,0.18),
        7px 12px 26px rgba(0,0,0,0.80),
        inset 2px 3px 14px rgba(255,220,110,0.28),
        inset -5px -7px 18px rgba(0,0,0,0.55);
    }
    .orb-wrapper:hover .orb-label { color: var(--gold-light); }
    .orb-wrapper.active .orb-body {
      box-shadow:
        0 0 0 2.5px rgba(240,204,106,0.75),
        0 0 30px rgba(201,168,76,0.65),
        0 0 75px rgba(201,168,76,0.28),
        0 0 120px rgba(201,168,76,0.10),
        7px 14px 28px rgba(0,0,0,0.75),
        inset 3px 4px 18px rgba(255,230,120,0.30),
        inset -5px -7px 18px rgba(0,0,0,0.55);
    }
    .orb-wrapper.active .orb-label { color: var(--gold-light); }

    /* Rune ring visible on active */
    .orb-ring {
      position: absolute; inset: -7px;
      border-radius: 50%;
      border: 1.5px dashed rgba(201,168,76,0.0);
      transition: border-color 0.4s ease;
      pointer-events: none;
      z-index: 6;
    }
    .orb-wrapper.active .orb-ring,
    .orb-wrapper:hover .orb-ring {
      border-color: rgba(201,168,76,0.45);
      animation: ringRotate 12s linear infinite;
    }
    .orb-wrapper.active .orb-ring { border-color: rgba(240,204,106,0.65); animation-duration: 9s; }

    /* ══════════════════════════════════════
       FLOAT ANIMATIONS (6 variants — semi-random)
    ══════════════════════════════════════ */
    @keyframes ringRotate { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    @keyframes float1 {
      0%,100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
      30%      { transform: translateY(-10px) translateX(2px) rotate(1.2deg); }
      65%      { transform: translateY(5px)  translateX(-1px) rotate(-0.6deg); }
    }
    @keyframes float2 {
      0%,100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
      25%      { transform: translateY(-7px) translateX(-2px) rotate(-1deg); }
      70%      { transform: translateY(8px)  translateX(1px) rotate(0.8deg); }
    }
    @keyframes float3 {
      0%,100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
      40%      { transform: translateY(-12px) translateX(3px) rotate(1.5deg); }
      75%      { transform: translateY(4px)  translateX(-2px) rotate(-0.9deg); }
    }
    @keyframes float4 {
      0%,100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
      35%      { transform: translateY(-8px) translateX(-3px) rotate(-0.7deg); }
      68%      { transform: translateY(6px)  translateX(2px) rotate(1.1deg); }
    }
    @keyframes float5 {
      0%,100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
      28%      { transform: translateY(-11px) translateX(1px) rotate(1deg); }
      72%      { transform: translateY(3px)  translateX(-3px) rotate(-1.3deg); }
    }
    @keyframes float6 {
      0%,100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
      45%      { transform: translateY(-9px) translateX(2px) rotate(-0.8deg); }
      78%      { transform: translateY(7px)  translateX(-1px) rotate(0.6deg); }
    }

    /* ══════════════════════════════════════
       PARCHMENT & CONTENT
    ══════════════════════════════════════ */
    .parchment {
      background:
        radial-gradient(ellipse at 18% 8%, #faf0d0 0%, transparent 45%),
        radial-gradient(ellipse at 82% 92%, #e8cd90 0%, transparent 45%),
        linear-gradient(155deg, #f6e6ba 0%, #eecf92 40%, #f4e0aa 70%, #e9cd8e 100%);
      background-color: #f0dba8;
      border: 1.5px solid var(--gold-dim);
      box-shadow:
        inset 0 0 35px rgba(139,106,40,0.14),
        inset 0 0 90px rgba(139,106,40,0.07),
        0 0 50px rgba(0,0,0,0.85),
        0 0 100px rgba(0,0,0,0.5);
      border-radius: 3px;
      position: relative;
    }
    .corner { position: absolute; width: 28px; height: 28px; opacity: 0.45; }
    .corner-tl { top:8px;  left:8px;  border-top:1.5px solid var(--gold); border-left:1.5px solid var(--gold); }
    .corner-tr { top:8px;  right:8px; border-top:1.5px solid var(--gold); border-right:1.5px solid var(--gold); }
    .corner-bl { bottom:8px; left:8px;  border-bottom:1.5px solid var(--gold); border-left:1.5px solid var(--gold); }
    .corner-br { bottom:8px; right:8px; border-bottom:1.5px solid var(--gold); border-right:1.5px solid var(--gold); }

    .section-title-text {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 700; color: #3d2010; letter-spacing: 0.04em;
    }
    .section-sub { font-family:'Cinzel',serif; font-size:0.78rem; color: var(--gold-dim); letter-spacing:0.14em; text-transform:uppercase; }
    .content-heading {
      font-family:'Cinzel',serif; font-size:0.95rem; font-weight:700;
      color:#5c2a00; border-bottom:1px solid #c9a84c44;
      padding-bottom:3px; margin-bottom:9px;
    }
    .content-body { font-family:'Crimson Text',serif; font-size:1.06rem; line-height:1.78; color:#2a1208; }
    .content-body strong { color:#5c1a00; }
    .content-body em { color:#4a2a00; }
    .highlight-box {
      background:rgba(201,168,76,0.12); border-left:3px solid var(--gold);
      padding:9px 15px; border-radius:0 5px 5px 0; margin:12px 0;
      font-size:0.98rem; color:#3d2010; line-height:1.65;
    }
    .exam-tip {
      background:rgba(139,16,16,0.08); border-left:3px solid #8b1010;
      padding:9px 15px; border-radius:0 5px 5px 0; margin:12px 0;
      font-size:0.98rem; color:#3d1010; line-height:1.65;
    }
    .rune-div {
      display:flex; align-items:center; gap:10px;
      margin:18px 0; color:rgba(201,168,76,0.65); font-size:0.82rem;
    }
    .rune-div::before,.rune-div::after {
      content:''; flex:1; height:1px;
      background:linear-gradient(to right, transparent, #c9a84c66);
    }
    .rune-div::after { background:linear-gradient(to left, transparent, #c9a84c66); }

    /* ══════════════════════════════════════
       MCQ
    ══════════════════════════════════════ */
    .mcq-opt {
      cursor:pointer; padding:9px 15px; border-radius:5px;
      border:1px solid #8b6a3038;
      background:rgba(255,248,232,0.30);
      font-family:'Crimson Text',serif; font-size:1.01rem; color:#2a1208;
      transition:border-color .2s, background .2s;
    }
    .mcq-opt:hover:not(.locked) { border-color:#c9a84c77; background:rgba(201,168,76,0.11); }
    .mcq-opt.correct { border-color:#1a5c2a; background:rgba(26,92,42,0.15); }
    .mcq-opt.wrong   { border-color:#8b1010; background:rgba(139,16,16,0.12); }
    .mcq-opt.reveal  { border-color:#1a5c2a; background:rgba(26,92,42,0.09); }
    .mcq-fb { font-family:'IM Fell English',serif; font-size:0.97rem; padding:9px 14px; border-radius:5px; margin-top:9px; line-height:1.6; }
    .mcq-fb.ok  { background:rgba(26,92,42,0.11); color:#0f3a18; border:1px solid #1a5c2a44; }
    .mcq-fb.bad { background:rgba(139,16,16,0.09); color:#5c0a0a; border:1px solid #8b101044; }
    .dot { width:9px; height:9px; border-radius:50%; background:#c9a84c33; border:1px solid #c9a84c66; cursor:pointer; transition:all .2s; }
    .dot.ok   { background:var(--gold); }
    .dot.bad  { background:#8b1010; }

    /* ══════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════ */
    @keyframes inkIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmerGold {
      0%   { background-position: -300% center; }
      100% { background-position:  300% center; }
    }
    .gold-text {
      background: linear-gradient(90deg,#a07828,#f0cc6a,#c9a84c,#f7e090,#c9a84c);
      background-size:300% auto;
      -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:shimmerGold 4.5s linear infinite;
    }
    .ink-in { animation:inkIn 0.5s ease-out both; }

    /* ══════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════ */
    .page-layout {
      display: flex;
      gap: 28px;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 18px 60px;
      align-items: flex-start;
    }
    .orb-column {
      width: 140px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: sticky;
      top: 20px;
    }
    .content-column { flex: 1; min-width: 0; }

    /* Mobile: stack */
    @media (max-width: 700px) {
      .page-layout { flex-direction: column; padding: 0 14px 50px; }
      .orb-column {
        width: 100%;
        flex-direction: row;
        overflow-x: auto;
        position: static;
        padding: 8px 4px;
        gap: 18px;
        justify-content: flex-start;
      }
      .orb-column::-webkit-scrollbar { height: 4px; }
    }
  </style>
</head>
<body>
  <canvas id="star-canvas"></canvas>
  <div id="root"></div>

  <!-- Starfield canvas -->
  <script>
    (function(){
      const c=document.getElementById('star-canvas'),x=c.getContext('2d');
      let s=[];
      function resize(){ c.width=innerWidth; c.height=innerHeight; }
      function init(){ s=[];
        for(let i=0;i<240;i++) s.push({x:Math.random()*c.width,y:Math.random()*c.height,r:.2+Math.random()*1.3,ph:Math.random()*Math.PI*2,sp:.003+Math.random()*.008});
      }
      function draw(t){
        x.clearRect(0,0,c.width,c.height);
        s.forEach(p=>{
          const a=0.2+0.65*(0.5+0.5*Math.sin(p.ph+t*p.sp));
          x.beginPath(); x.arc(p.x,p.y,p.r,0,Math.PI*2);
          x.fillStyle=`rgba(240,215,145,${a})`; x.fill();
        });
        requestAnimationFrame(draw);
      }
      resize(); init();
      window.addEventListener('resize',()=>{resize();init();});
      requestAnimationFrame(draw);
    })();
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ════════════════════════════════════════════════════════
       SVG DIAGRAMS — one per section, visible inside the orb
    ════════════════════════════════════════════════════════ */

    // 1. OVERVIEW — Glycogen branched polymer structure
    const DiagramOverview = () => (
      <svg viewBox="0 0 100 100" fill="none" style={{width:'88%',height:'88%'}}>
        <text x="50" y="13" textAnchor="middle" fill="#c9a84c" fontSize="7.5" fontFamily="Georgia" fontStyle="italic">Glycogen</text>
        {/* Main α-1,4 chain at y=62, 5 nodes */}
        {[18,32,46,60,74].map((cx,i)=>(
          <g key={i}>
            {i>0 && <line x1={cx-11} y1="62" x2={cx-3} y2="62" stroke="#c9a84c" strokeWidth="2"/>}
            <circle cx={cx} cy="62" r="6.5" fill="rgba(201,168,76,0.18)" stroke="rgba(255,255,255,0.72)" strokeWidth="1.8"/>
          </g>
        ))}
        <text x="46" y="78" textAnchor="middle" fill="rgba(201,168,76,0.75)" fontSize="6" fontFamily="Georgia">α-1,4 chain</text>

        {/* α-1,6 branch upward from node 3 (x=46) */}
        <line x1="46" y1="55.5" x2="35" y2="37" stroke="#f0cc6a" strokeWidth="2" strokeDasharray="3,1.5"/>
        <circle cx="35" cy="37" r="6" fill="rgba(240,204,106,0.22)" stroke="#f0cc6a" strokeWidth="1.9"/>
        <line x1="35" y1="31" x2="24" y2="20" stroke="#f0cc6a" strokeWidth="1.7" strokeDasharray="3,1.5"/>
        <circle cx="24" cy="20" r="5" fill="rgba(240,204,106,0.18)" stroke="#f0cc6a" strokeWidth="1.7"/>
        {/* Label */}
        <text x="67" y="34" textAnchor="middle" fill="#f0cc6a" fontSize="6" fontFamily="Georgia">α-1,6</text>
        <text x="67" y="41" textAnchor="middle" fill="#f0cc6a" fontSize="6" fontFamily="Georgia">branch</text>
        {/* branch point indicator */}
        <circle cx="46" cy="62" r="3" fill="#f0cc6a" opacity="0.7"/>
      </svg>
    );

    // 2. GLYCOGENESIS — Synthesis pathway (bottom-up building)
    const DiagramGlycogenesis = () => (
      <svg viewBox="0 0 100 100" fill="none" style={{width:'88%',height:'88%'}}>
        <text x="50" y="11" textAnchor="middle" fill="#c9a84c" fontSize="7.5" fontFamily="Georgia" fontStyle="italic">Synthesis</text>
        {/* 5 pathway nodes as small rounded rects + arrows */}
        {[
          {y:20, label:'Glucose',  color:'rgba(255,255,255,0.75)'},
          {y:36, label:'G-6-P',    color:'rgba(201,168,76,0.9)'},
          {y:52, label:'G-1-P',    color:'rgba(201,168,76,0.9)'},
          {y:68, label:'UDPGlc',   color:'rgba(240,204,106,0.9)'},
          {y:84, label:'Glycogen', color:'rgba(240,204,106,1.0)'},
        ].map((n,i,a)=>(
          <g key={i}>
            {i>0 && (
              <>
                <line x1="50" y1={a[i-1].y+6} x2="50" y2={n.y-6} stroke="#c9a84c" strokeWidth="1.5"/>
                <polygon points={`50,${n.y-6} 47,${n.y-10} 53,${n.y-10}`} fill="#c9a84c"/>
              </>
            )}
            <rect x="26" y={n.y-6} width="48" height="12" rx="3"
              fill={i===4?'rgba(201,168,76,0.25)':'rgba(255,255,255,0.07)'} stroke={n.color} strokeWidth="1.3"/>
            <text x="50" y={n.y+4.5} textAnchor="middle" fill={n.color} fontSize="6.5" fontFamily="Georgia" fontWeight={i===4?'bold':'normal'}>{n.label}</text>
          </g>
        ))}
        {/* ATP/UTP side labels */}
        <text x="14" y="30" fill="rgba(255,255,255,0.35)" fontSize="5.5" fontFamily="Georgia">ATP</text>
        <text x="14" y="62" fill="rgba(255,255,255,0.35)" fontSize="5.5" fontFamily="Georgia">UTP</text>
      </svg>
    );

    // 3. GLYCOGENOLYSIS — Breakdown pathway
    const DiagramGlycolysis = () => (
      <svg viewBox="0 0 100 100" fill="none" style={{width:'88%',height:'88%'}}>
        <text x="50" y="11" textAnchor="middle" fill="#c9a84c" fontSize="7.5" fontFamily="Georgia" fontStyle="italic">Breakdown</text>
        {/* Glycogen at top */}
        <rect x="22" y="14" width="56" height="13" rx="3" fill="rgba(201,168,76,0.22)" stroke="rgba(255,255,255,0.65)" strokeWidth="1.5"/>
        <text x="50" y="24" textAnchor="middle" fill="rgba(255,255,255,0.8)" fontSize="7" fontFamily="Georgia">Glycogen</text>

        {/* Phosphorylase arrow going left-down to G1P */}
        <line x1="38" y1="28" x2="28" y2="52" stroke="#c9a84c" strokeWidth="1.6"/>
        <polygon points="28,52 24,46 32,48" fill="#c9a84c"/>
        <text x="10" y="42" fill="#c9a84c" fontSize="5.5" fontFamily="Georgia">Phos-</text>
        <text x="10" y="49" fill="#c9a84c" fontSize="5.5" fontFamily="Georgia">phorylase</text>
        <rect x="13" y="54" width="30" height="12" rx="3" fill="rgba(201,168,76,0.2)" stroke="#c9a84c" strokeWidth="1.4"/>
        <text x="28" y="63.5" textAnchor="middle" fill="#c9a84c" fontSize="6.5" fontFamily="Georgia">G-1-P</text>

        {/* Debranching arrow going right-down to free glucose */}
        <line x1="62" y1="28" x2="72" y2="52" stroke="#f0cc6a" strokeWidth="1.6" strokeDasharray="2.5,1.5"/>
        <polygon points="72,52 68,46 76,46" fill="#f0cc6a"/>
        <text x="70" y="42" fill="#f0cc6a" fontSize="5.5" fontFamily="Georgia">De-</text>
        <text x="70" y="49" fill="#f0cc6a" fontSize="5.5" fontFamily="Georgia">branch</text>
        <rect x="57" y="54" width="34" height="12" rx="3" fill="rgba(240,204,106,0.15)" stroke="#f0cc6a" strokeWidth="1.4"/>
        <text x="74" y="63.5" textAnchor="middle" fill="#f0cc6a" fontSize="6.2" fontFamily="Georgia">Free Glc</text>

        {/* G1P → G6P arrow in liver */}
        <line x1="28" y1="67" x2="28" y2="78" stroke="#c9a84c" strokeWidth="1.3"/>
        <polygon points="28,78 25,74 31,74" fill="#c9a84c"/>
        <rect x="13" y="79" width="30" height="12" rx="3" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" strokeWidth="1.2"/>
        <text x="28" y="88.5" textAnchor="middle" fill="rgba(201,168,76,0.8)" fontSize="6.2" fontFamily="Georgia">G-6-P</text>
        <text x="28" y="98" textAnchor="middle" fill="rgba(255,255,255,0.3)" fontSize="5" fontFamily="Georgia">→ Blood</text>
      </svg>
    );

    // 4. REGULATION — Reciprocal cAMP cascade
    const DiagramRegulation = () => (
      <svg viewBox="0 0 100 100" fill="none" style={{width:'88%',height:'88%'}}>
        <text x="50" y="11" textAnchor="middle" fill="#c9a84c" fontSize="7.5" fontFamily="Georgia" fontStyle="italic">Regulation</text>
        {/* Hormone at top center */}
        <polygon points="50,16 43,28 57,28" fill="rgba(201,168,76,0.3)" stroke="#c9a84c" strokeWidth="1.5"/>

      {
        id:'clinical', title:'Clinical', subtitle:'Glycogen Storage Diseases',
        content:[
          { heading:'What Are Glycogen Storage Diseases?',
            text:`Glycogen storage diseases (GSDs) are <strong>inherited (autosomal recessive) metabolic disorders</strong> caused by defects in enzymes or transporters involved in glycogen synthesis, degradation, or glucose release. The result is abnormal <em>accumulation</em> of glycogen, deposition of <em>structurally abnormal</em> glycogen, or <em>failure to mobilise</em> glycogen when needed. Clinical features range from fasting hypoglycaemia to progressive muscle weakness and cardiomegaly, with some subtypes fatal in early childhood.` },

            text:`<strong>Type I — Von Gierke Disease</strong> (glucose-6-phosphatase deficiency): G6P accumulates; free glucose cannot be exported. Severe fasting hypoglycaemia, massive hepatomegaly, lactic acidosis, hyperlipidaemia. A variant is caused by defective G6P <em>transporter</em>.<br/><br/>
            <strong>Type II — Pompe Disease</strong> (lysosomal acid α-glucosidase / acid maltase deficiency): Glycogen accumulates in lysosomes. Affects heart (massive cardiomegaly) and muscle. Early infantile form is rapidly fatal without enzyme replacement therapy.<br/><br/>
            <strong>Type III — Cori/Forbes Disease</strong> (debranching enzyme deficiency): Limit dextrin accumulates. Milder than Type I; liver and muscle involved.<br/><br/>

            text:`Four counter-regulatory hormones stimulate gluconeogenesis and glycogenolysis during fasting/stress: <strong>Glucagon</strong> (primarily liver), <strong>Epinephrine</strong> (primarily muscle), <strong>Cortisol</strong> (induces gluconeogenic enzyme gene expression over hours), and <strong>Growth Hormone</strong> (promotes lipolysis to fuel gluconeogenesis). <strong>Insulin</strong> opposes all four — stimulating glycogenesis and inhibiting gluconeogenesis.` },
          { type:'highlight', text:`🩺 Renal Threshold: Normal urine = zero glucose. Blood glucose > 10 mmol/L overwhelms tubular SGLT reabsorption → glucosuria. Classic sign of uncontrolled T1DM or T2DM. Historically detected by the sweet taste of urine — noted in Egyptian and Indian medical texts thousands of years ago.` }

            answer:2, explanation:'Lysosomes contain acid α-glucosidase (acid maltase) to degrade glycogen engulfed by autophagy. In Pompe disease, its deficiency fills lysosomes with glycogen → massive cardiomegaly and skeletal muscle weakness. Enzyme replacement therapy (alglucosidase alfa) is the standard of care.' }

    /* ════════════════════════════════════════════════════════
       MCQ PANEL
    ════════════════════════════════════════════════════════ */
    function MCQPanel({ section }) {
      const [cur, setCur]       = useState(0);
      const [answered, setAns]  = useState(() => new Array(section.mcqs.length).fill(null));
      const [lockedArr, setLk]  = useState(() => new Array(section.mcqs.length).fill(false));
      const [sel, setSel]       = useState(null);
      const [locked, setLocked] = useState(false);

      useEffect(() => {
        setCur(0); setAns(new Array(section.mcqs.length).fill(null));
        setLk(new Array(section.mcqs.length).fill(false));
        setSel(null); setLocked(false);
      }, [section.id]);

      const q = section.mcqs[cur];

      const choose = (i) => {
        if (locked) return;
        setSel(i); setLocked(true);
        const a=[...answered]; a[cur]=i; setAns(a);
        const l=[...lockedArr]; l[cur]=true; setLk(l);
      };
      const goTo = (i) => { setCur(i); setSel(answered[i]); setLocked(lockedArr[i]); };

      const isOk = sel === q.answer;

      return (
        <div style={{ borderTop:'1px solid #c9a84c44', marginTop:'28px', paddingTop:'20px' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'16px' }}>
            <span style={{ fontFamily:"'Cinzel Decorative',serif", fontSize:'0.82rem', color:'#5c2a00' }}>
              📖 Practice MCQs
            </span>
            <div style={{ display:'flex', gap:'6px' }}>
              {section.mcqs.map((_,i) => (
                <div key={i} className={`dot ${answered[i]!==null ? (answered[i]===section.mcqs[i].answer?'ok':'bad') : ''}`}
                  style={{ outline: i===cur ? '2px solid #c9a84c' : 'none', outlineOffset:'2px' }}
                  onClick={()=>goTo(i)} title={`Q${i+1}`}/>
              ))}
            </div>
          </div>

          <div style={{ fontFamily:"'Cinzel',serif", fontSize:'0.68rem', color:'#c9a84c88', letterSpacing:'0.1em', marginBottom:'12px' }}>
            QUESTION {cur+1} OF {section.mcqs.length}
          </div>

          <p key={`q-${cur}`} style={{ fontFamily:"'IM Fell English',serif", fontStyle:'italic', fontSize:'1.07rem', color:'#2a1208', lineHeight:1.75, marginBottom:'14px', animation:'inkIn .38s ease-out both' }}>
            {q.q}
          </p>

          <div key={`o-${cur}`} style={{ display:'flex', flexDirection:'column', gap:'7px', marginBottom:'12px', animation:'inkIn .38s ease-out both' }}>
            {q.opts.map((opt,i) => {
              let cls = 'mcq-opt';
              if (locked) {
                if (i===q.answer) cls += ' reveal';
                else if (i===sel) cls += ' wrong';
                cls += ' locked';
              }
              return (
                <div key={i} className={cls} onClick={()=>choose(i)} style={{ userSelect:'none' }}>
                  {opt}
                  {locked && i===q.answer && <span style={{ marginLeft:8, color:'#1a5c2a', fontWeight:700 }}>✓</span>}
                  {locked && i===sel && i!==q.answer && <span style={{ marginLeft:8, color:'#8b1010', fontWeight:700 }}>✗</span>}
                </div>
              );
            })}
          </div>

          {locked && (
            <div className={`mcq-fb ${isOk?'ok':'bad'}`} style={{ animation:'inkIn .35s ease-out both' }}>
              <strong>{isOk ? '✦ Excellent, Scholar! ' : '✦ Not quite — '}</strong>{q.explanation}
            </div>
          )}

          <div style={{ display:'flex', justifyContent:'space-between', marginTop:'16px' }}>
            <button onClick={()=>cur>0&&goTo(cur-1)} disabled={cur===0}
              style={{ fontFamily:"'Cinzel',serif", fontSize:'0.75rem', letterSpacing:'0.07em', padding:'7px 16px', borderRadius:'3px', background: cur===0?'#c9a84c0a':'rgba(201,168,76,0.13)', border:`1px solid ${cur===0?'#c9a84c1a':'#c9a84c55'}`, color:cur===0?'#c9a84c33':'#5c3a00', cursor:cur===0?'default':'pointer' }}>
              ← Prev
            </button>
            <button onClick={()=>cur<section.mcqs.length-1&&goTo(cur+1)} disabled={cur===section.mcqs.length-1}
              style={{ fontFamily:"'Cinzel',serif", fontSize:'0.75rem', letterSpacing:'0.07em', padding:'7px 16px', borderRadius:'3px', background:cur===section.mcqs.length-1?'#c9a84c0a':'rgba(201,168,76,0.22)', border:`1px solid ${cur===section.mcqs.length-1?'#c9a84c1a':'#c9a84c77'}`, color:cur===section.mcqs.length-1?'#c9a84c33':'#3d1a00', cursor:cur===section.mcqs.length-1?'default':'pointer', fontWeight:600 }}>
              Next →
            </button>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════════════════
       CONTENT BLOCK
    ════════════════════════════════════════════════════════ */
    function ContentBlock({ block, delay }) {
      const style = { animation:`inkIn 0.5s ease-out ${delay}s both` };
      if (block.type==='highlight') return <div className="highlight-box" style={style} dangerouslySetInnerHTML={{__html:block.text}}/>;
      if (block.type==='exam')      return <div className="exam-tip"     style={style} dangerouslySetInnerHTML={{__html:block.text}}/>;
      return (
        <div style={{ marginBottom:'18px', ...style }}>
          <div className="content-heading">{block.heading}</div>
          <p className="content-body" dangerouslySetInnerHTML={{__html:block.text}}/>
        </div>
      );
    }

    /* ════════════════════════════════════════════════════════
       MAGIC ORB
    ════════════════════════════════════════════════════════ */
    function MagicOrb({ section, Diagram, isActive, onClick, floatAnim, orbIdx }) {
      const style = {
        animation: `${floatAnim.name} ${floatAnim.dur} ease-in-out ${floatAnim.delay} infinite`,
        marginTop: orbIdx === 0 ? '0' : `${ORB_GAPS[orbIdx]}px`,
        transform: `translateX(${ORB_OFFSETS[orbIdx]}px)`,
      };
      // Active orb gets slower, more majestic float
      const bodyStyle = isActive ? { animationDuration: '3.5s' } : {};

      return (
        <div className={`orb-wrapper ${isActive ? 'active' : ''}`} onClick={onClick}
          style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'6px', marginTop: orbIdx===0?0:`${ORB_GAPS[orbIdx]}px`, transform:`translateX(${ORB_OFFSETS[orbIdx]}px)` }}>
          {/* The floating wrapper handles the Y animation */}
          <div style={{ animation:`${floatAnim.name} ${floatAnim.dur} ease-in-out ${floatAnim.delay} infinite` }}>
            <div className="orb-body">
              {/* Outer rune ring */}
              <div className="orb-ring"/>
              {/* The SVG diagram */}
              <div className="orb-diagram">
                <Diagram/>
              </div>
            </div>
          </div>
          <div className="orb-label">{section.title}</div>
        </div>
      );
    }
